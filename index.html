<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>Bubble Sort Chatbot</title>

  <!-- 📱 iPhone viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ece5dd;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .chat-container {
      width: 100%;
      max-width: 500px;
      height: 100dvh;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #e5ddd5;
    }

    .message {
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 15px;
      max-width: 75%;
      word-wrap: break-word;
    }

    .user {
      background: #dcf8c6;
      margin-left: auto;
    }

    .bot {
      background: #fff;
      margin-right: auto;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: 1px solid #ccc;
      font-size: 16px; /* sprječava zoom na iPhone */
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      border: none;
      border-radius: 20px;
      background: #075e54;
      color: white;
      font-size: 16px;
    }

    button:hover {
      background: #0b7d6e;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">🤖 Bubble Sort Chatbot</div>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-box">
    <input id="userInput" placeholder="Upiši pitanje..." autocomplete="off" />
    <button onclick="sendMessage()">Pošalji</button>
  </div>
</div>

<script>

// 🔤 NORMALIZACIJA (radi na iPhone)
function normalizeText(text) {
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/č|ć/g, "c")
    .replace(/ž/g, "z")
    .replace(/š/g, "s")
    .replace(/đ/g, "d");
}

// 💬 DODAVANJE PORUKE
function addMessage(text, sender) {
  let chatBox = document.getElementById("chatBox");
  let msg = document.createElement("div");

  msg.classList.add("message", sender);
  msg.innerText = text;

  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// 🔢 BUBBLE SORT
function bubbleSort(arr) {
  for (let i = 0; i < arr.length; i++) {
    for (let j = 0; j < arr.length - i - 1; j++) {
      if (arr[j] > arr[j + 1]) {
        let temp = arr[j];
        arr[j] = arr[j + 1];
        arr[j + 1] = temp;
      }
    }
  }
  return arr;
}

// 🧠 ODGOVORI
function getBotReply(input) {

  if (input.includes("sto je")) {
    return "Bubble sort je algoritam koji uspoređuje susjedne elemente i zamjenjuje ih dok niz nije sortiran.";
  }

  else if (input.includes("kako radi")) {
    return "Radi tako da više puta prolazi kroz niz i zamjenjuje elemente koji su u krivom redoslijedu.";
  }

  else if (input.includes("slozenost")) {
    return "Vremenska složenost je O(n^2), što ga čini sporim za velike nizove.";
  }

  else if (input.includes("prednosti")) {
    return "Prednost: jednostavan. Mana: spor i neučinkovit za velike podatke.";
  }

  else if (input.includes("sortiraj")) {
    let numbers = input.match(/\d+/g);

    if (numbers) {
      let sorted = bubbleSort(numbers.map(Number));
      return "Sortirani niz: " + sorted.join(", ");
    } else {
      return "Upiši brojeve npr: sortiraj 5 3 1 4";
    }
  }

  else {
    return "Pitaj nešto o bubble sortu (npr. što je, kako radi, složenost ili sortiraj 5 3 2)";
  }
}

// 🚀 SLANJE PORUKE
function sendMessage() {
  let inputField = document.getElementById("userInput");
  let rawText = inputField.value;

  if (rawText === "") return;

  let text = normalizeText(rawText);

  addMessage(rawText, "user");
  inputField.value = "";
  inputField.blur(); // zatvara tipkovnicu na iPhone

  addMessage("...", "bot");

  setTimeout(() => {
    let chatBox = document.getElementById("chatBox");
    chatBox.removeChild(chatBox.lastChild);

    let reply = getBotReply(text);
    addMessage(reply, "bot");
  }, 700);
}

// ⌨️ ENTER za slanje (iPhone friendly)
document.getElementById("userInput")
.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

// 🎯 AUTO FOKUS
window.onload = () => {
  document.getElementById("userInput").focus();
};

</script>

</body>
</html>
